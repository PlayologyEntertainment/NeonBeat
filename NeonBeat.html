<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEONBEAT — Loop Mixer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
/* ─── CSS Variables & Reset ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep:      #050510;
  --bg-panel:     #0a0a1a;
  --bg-card:      #0e0e22;
  --bg-card2:     #12122a;
  --neon-pink:    #ff2d78;
  --neon-cyan:    #00f5ff;
  --neon-purple:  #bf00ff;
  --neon-yellow:  #ffe600;
  --neon-green:   #00ff9d;
  --text-bright:  #f0f0ff;
  --text-mid:     #8888aa;
  --text-dim:     #444466;
  --border-glow:  rgba(0,245,255,0.18);
  --grid-color:   rgba(0,245,255,0.04);
  --track-colors: #ff2d78, #00f5ff, #bf00ff, #ffe600, #00ff9d, #ff7700, #ff2d78, #00aaff;
}

html { font-size: 14px; }
body {
  background: var(--bg-deep);
  color: var(--text-bright);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    linear-gradient(var(--grid-color) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-color) 1px, transparent 1px),
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(191,0,255,0.15) 0%, transparent 70%);
  background-size: 40px 40px, 40px 40px, 100% 100%;
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--neon-purple); border-radius: 3px; }

/* ─── Glitch / Neon Text ─── */
.glitch {
  position: relative;
  display: inline-block;
}
.glitch::before, .glitch::after {
  content: attr(data-text);
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
}
.glitch::before {
  color: var(--neon-cyan);
  animation: glitch1 3.5s infinite;
  clip-path: polygon(0 30%, 100% 30%, 100% 55%, 0 55%);
  transform: translateX(-2px);
}
.glitch::after {
  color: var(--neon-pink);
  animation: glitch2 3.5s infinite;
  clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
  transform: translateX(2px);
}
@keyframes glitch1 {
  0%,94%,100% { opacity:0; transform:translateX(-2px); }
  95% { opacity:1; transform:translateX(-4px) skewX(-10deg); }
  97% { opacity:1; transform:translateX(2px) skewX(5deg); }
}
@keyframes glitch2 {
  0%,96%,100% { opacity:0; transform:translateX(2px); }
  97% { opacity:1; transform:translateX(4px) skewX(10deg); }
  99% { opacity:1; transform:translateX(-1px) skewX(-3deg); }
}

/* ─── Header ─── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 28px 14px;
  border-bottom: 1px solid rgba(0,245,255,0.12);
  background: linear-gradient(180deg, rgba(10,0,30,0.95) 0%, transparent 100%);
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
}
.logo {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 1.6rem;
  letter-spacing: 0.12em;
  color: var(--neon-cyan);
  text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px rgba(0,245,255,0.4);
}
.logo span { color: var(--neon-pink); text-shadow: 0 0 20px var(--neon-pink); }

.header-status {
  display: flex;
  align-items: center;
  gap: 20px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.78rem;
  color: var(--text-mid);
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--neon-green);
  box-shadow: 0 0 8px var(--neon-green);
  animation: pulse-dot 1.5s ease-in-out infinite;
}
.status-dot.inactive { background: var(--text-dim); box-shadow: none; animation: none; }
@keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

/* ─── Master Transport Bar ─── */
#transport {
  display: grid;
  grid-template-columns: auto 1fr auto auto auto;
  align-items: center;
  gap: 20px;
  padding: 16px 28px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border-glow);
}

.play-btn {
  width: 52px; height: 52px;
  border-radius: 50%;
  border: 2px solid var(--neon-cyan);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  box-shadow: 0 0 12px rgba(0,245,255,0.3), inset 0 0 12px rgba(0,245,255,0.05);
  flex-shrink: 0;
}
.play-btn:hover {
  background: rgba(0,245,255,0.1);
  box-shadow: 0 0 24px rgba(0,245,255,0.6), inset 0 0 20px rgba(0,245,255,0.1);
  transform: scale(1.05);
}
.play-btn svg { fill: var(--neon-cyan); }

.bpm-block {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  min-width: 120px;
}
.bpm-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.2em;
}
.bpm-row { display: flex; align-items: center; gap: 10px; }
.bpm-value {
  font-family: 'Orbitron', monospace;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--neon-yellow);
  text-shadow: 0 0 16px var(--neon-yellow);
  line-height: 1;
  min-width: 3ch;
  text-align: right;
}
.bpm-input {
  background: transparent;
  border: none;
  color: var(--neon-yellow);
  font-family: 'Orbitron', monospace;
  font-size: 1.8rem;
  font-weight: 700;
  width: 4ch;
  text-align: right;
  text-shadow: 0 0 16px var(--neon-yellow);
  outline: none;
  cursor: pointer;
}
.bpm-input:focus { border-bottom: 1px solid var(--neon-yellow); }
.bpm-input::-webkit-inner-spin-button,
.bpm-input::-webkit-outer-spin-button { -webkit-appearance: none; }

.master-vol-block {
  display: flex; flex-direction: column; gap: 4px; align-items: center;
}
.master-vol-block .ctrl-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem; color: var(--text-dim); letter-spacing: 0.2em;
}

.beat-clock {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-mid);
  line-height: 1.6;
  text-align: right;
}
#beat-display {
  font-family: 'Orbitron', monospace;
  font-size: 1rem;
  color: var(--neon-green);
  text-shadow: 0 0 10px var(--neon-green);
}

/* ─── Beat Visualizer ─── */
.beat-dots {
  display: flex; gap: 5px; align-items: center;
}
.beat-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--text-dim);
  transition: background 0.05s, box-shadow 0.05s;
}
.beat-dot.active {
  background: var(--neon-green);
  box-shadow: 0 0 8px var(--neon-green);
}

/* ─── Add Track Area ─── */
#add-track-bar {
  display: flex;
  gap: 10px;
  padding: 12px 28px;
  background: rgba(10,10,26,0.8);
  border-bottom: 1px solid var(--border-glow);
  flex-wrap: wrap;
  align-items: center;
}
.add-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 16px;
  border-radius: 4px;
  border: 1px solid;
  background: transparent;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  transition: all 0.15s;
  text-transform: uppercase;
}
.add-btn.upload  { color: var(--neon-cyan);   border-color: var(--neon-cyan);   }
.add-btn.demo    { color: var(--neon-purple); border-color: var(--neon-purple); }
.add-btn.url     { color: var(--neon-yellow); border-color: var(--neon-yellow); }
.add-btn.mic     { color: var(--neon-pink);   border-color: var(--neon-pink);   }

.add-btn:hover { filter: brightness(1.4); transform: translateY(-1px); }
.add-btn:hover.upload  { background: rgba(0,245,255,0.08);   box-shadow: 0 0 12px rgba(0,245,255,0.3); }
.add-btn:hover.demo    { background: rgba(191,0,255,0.08);   box-shadow: 0 0 12px rgba(191,0,255,0.3); }
.add-btn:hover.url     { background: rgba(255,230,0,0.08);   box-shadow: 0 0 12px rgba(255,230,0,0.3); }
.add-btn:hover.mic     { background: rgba(255,45,120,0.08);  box-shadow: 0 0 12px rgba(255,45,120,0.3); }

#url-input-row {
  display: none;
  align-items: center;
  gap: 8px;
  width: 100%;
}
#url-input-row.visible { display: flex; }
#url-field {
  flex: 1;
  background: var(--bg-card);
  border: 1px solid var(--neon-yellow);
  border-radius: 4px;
  padding: 7px 12px;
  color: var(--neon-yellow);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.8rem;
  outline: none;
}
#url-field::placeholder { color: rgba(255,230,0,0.3); }
.url-go-btn {
  padding: 7px 14px;
  background: var(--neon-yellow);
  color: #000;
  border: none;
  border-radius: 4px;
  font-family: 'Orbitron', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.1em;
  transition: all 0.15s;
}
.url-go-btn:hover { box-shadow: 0 0 16px var(--neon-yellow); }

/* ─── Demo Modal ─── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
}
.modal-overlay.visible { display: flex; }
.modal {
  background: var(--bg-card);
  border: 1px solid var(--neon-purple);
  border-radius: 8px;
  padding: 28px;
  min-width: 340px;
  box-shadow: 0 0 40px rgba(191,0,255,0.3);
}
.modal h2 {
  font-family: 'Orbitron', monospace;
  font-size: 1rem;
  color: var(--neon-purple);
  margin-bottom: 18px;
  letter-spacing: 0.1em;
}
.demo-list { display: flex; flex-direction: column; gap: 8px; }
.demo-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  background: var(--bg-card2);
  border: 1px solid rgba(191,0,255,0.2);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.demo-item:hover {
  border-color: var(--neon-purple);
  background: rgba(191,0,255,0.1);
  box-shadow: 0 0 10px rgba(191,0,255,0.2);
}
.demo-item-name { font-weight: 600; font-size: 0.9rem; }
.demo-item-meta { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--text-mid); }
.modal-close {
  margin-top: 18px;
  width: 100%;
  padding: 8px;
  background: transparent;
  border: 1px solid var(--text-dim);
  border-radius: 4px;
  color: var(--text-mid);
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  transition: all 0.15s;
}
.modal-close:hover { border-color: var(--text-bright); color: var(--text-bright); }

/* ─── Track List ─── */
#tracks-container {
  padding: 16px 28px 100px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.85rem;
  line-height: 2;
}
.empty-state .big-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }

/* ─── Track Card ─── */
.track-card {
  background: var(--bg-card);
  border-radius: 6px;
  border: 1px solid var(--border-glow);
  overflow: hidden;
  transition: box-shadow 0.2s;
  animation: track-in 0.25s ease-out;
}
@keyframes track-in {
  from { opacity:0; transform: translateY(12px); }
  to   { opacity:1; transform: translateY(0); }
}
.track-card:hover { box-shadow: 0 0 20px rgba(0,245,255,0.07); }
.track-card.muted { opacity: 0.5; }
.track-card.solo-active { border-color: var(--neon-yellow) !important; box-shadow: 0 0 16px rgba(255,230,0,0.2); }

.track-top {
  display: grid;
  grid-template-columns: 4px auto 1fr auto auto auto auto auto auto;
  align-items: center;
  gap: 12px;
  padding: 10px 16px 10px 0;
  min-height: 56px;
}
.track-accent {
  width: 4px;
  align-self: stretch;
  border-radius: 0;
  flex-shrink: 0;
}

.track-play-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid currentColor;
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
  flex-shrink: 0;
}
.track-play-btn:hover { background: rgba(255,255,255,0.08); }

.track-name-block { min-width: 0; }
.track-name {
  font-weight: 600;
  font-size: 0.92rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
}
.track-name:focus {
  outline: none;
  border-bottom: 1px solid var(--neon-cyan);
}
.track-meta {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.62rem;
  color: var(--text-dim);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Track Waveform mini */
.track-waveform {
  height: 32px;
  flex: 1;
  overflow: hidden;
  position: relative;
  min-width: 60px;
  display: none;
}
.track-waveform canvas { width: 100%; height: 100%; display: block; }

.track-ctrl-group {
  display: flex; flex-direction: column; align-items: center;
  gap: 2px;
}
.ctrl-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  color: var(--text-dim);
  letter-spacing: 0.15em;
}
.track-bpm-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  padding: 2px 6px;
  border-radius: 3px;
  background: rgba(255,230,0,0.1);
  color: var(--neon-yellow);
  border: 1px solid rgba(255,230,0,0.25);
  white-space: nowrap;
}

/* Knob */
.knob-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  user-select: none;
}
.knob {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--bg-card2);
  border: 2px solid var(--text-dim);
  position: relative;
  cursor: ns-resize;
  transition: border-color 0.15s;
}
.knob:hover { border-color: currentColor; }
.knob::after {
  content: '';
  position: absolute;
  top: 4px; left: 50%;
  transform: translateX(-50%);
  width: 3px; height: 10px;
  background: currentColor;
  border-radius: 2px;
  transform-origin: 1.5px calc(14px);
}
.knob-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  color: var(--text-mid);
  min-width: 32px;
  text-align: center;
}

/* Fader */
.fader-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
input[type=range].fader {
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  width: 80px;
  cursor: pointer;
}
input[type=range].fader::-webkit-slider-runnable-track {
  height: 4px;
  border-radius: 2px;
  background: linear-gradient(90deg, currentColor var(--pct, 75%), var(--bg-card2) var(--pct, 75%));
}
input[type=range].fader::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: currentColor;
  margin-top: -5px;
  box-shadow: 0 0 6px currentColor;
}
input[type=range].fader::-moz-range-thumb {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: currentColor;
  border: none;
  box-shadow: 0 0 6px currentColor;
}

/* Toggle buttons */
.track-btn {
  width: 28px; height: 28px;
  border-radius: 3px;
  border: 1px solid var(--text-dim);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-family: 'Orbitron', monospace;
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  transition: all 0.12s;
  display: flex; align-items: center; justify-content: center;
}
.track-btn:hover { border-color: var(--text-bright); color: var(--text-bright); }
.track-btn.active-mute {
  background: rgba(255,45,120,0.2);
  border-color: var(--neon-pink);
  color: var(--neon-pink);
  box-shadow: 0 0 8px rgba(255,45,120,0.3);
}
.track-btn.active-solo {
  background: rgba(255,230,0,0.2);
  border-color: var(--neon-yellow);
  color: var(--neon-yellow);
  box-shadow: 0 0 8px rgba(255,230,0,0.3);
}
.track-btn.active-fx {
  background: rgba(191,0,255,0.2);
  border-color: var(--neon-purple);
  color: var(--neon-purple);
  box-shadow: 0 0 8px rgba(191,0,255,0.3);
}

.delete-btn {
  width: 24px; height: 24px;
  border-radius: 3px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 0.8rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
}
.delete-btn:hover { border-color: var(--neon-pink); color: var(--neon-pink); }

/* ─── FX Panel ─── */
.fx-panel {
  display: none;
  border-top: 1px solid rgba(191,0,255,0.15);
  background: rgba(0,0,10,0.5);
  padding: 14px 16px 14px 20px;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}
.fx-panel.open { display: grid; }

.fx-section {
  background: var(--bg-card2);
  border: 1px solid rgba(191,0,255,0.2);
  border-radius: 5px;
  padding: 10px 12px;
}
.fx-section-title {
  font-family: 'Orbitron', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--neon-purple);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.fx-toggle {
  width: 30px; height: 16px;
  border-radius: 8px;
  background: var(--text-dim);
  position: relative;
  cursor: pointer;
  border: none;
  transition: background 0.2s;
  flex-shrink: 0;
  margin-left: auto;
}
.fx-toggle::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: white;
  transition: transform 0.2s;
}
.fx-toggle.on { background: var(--neon-purple); }
.fx-toggle.on::after { transform: translateX(14px); }

.fx-row {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  gap: 8px;
}
.fx-row:last-child { margin-bottom: 0; }
.fx-row-label {
  font-size: 0.75rem;
  color: var(--text-mid);
  font-weight: 600;
  white-space: nowrap;
  min-width: 40px;
}
input[type=range].fx-slider {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 3px;
  background: var(--text-dim);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type=range].fx-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--neon-purple);
  box-shadow: 0 0 5px var(--neon-purple);
  transition: box-shadow 0.1s;
}
input[type=range].fx-slider:hover::-webkit-slider-thumb { box-shadow: 0 0 10px var(--neon-purple); }
.fx-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.62rem;
  color: var(--text-mid);
  min-width: 32px;
  text-align: right;
}

/* ─── Progress / Playhead ─── */
.track-progress-bar {
  height: 3px;
  background: var(--bg-card2);
  position: relative;
  overflow: hidden;
}
.track-progress-fill {
  height: 100%;
  background: currentColor;
  width: 0%;
  transition: none;
  box-shadow: 0 0 6px currentColor;
}

/* ─── Recording indicator ─── */
.rec-badge {
  display: none;
  background: var(--neon-pink);
  color: #000;
  font-family: 'Orbitron', monospace;
  font-size: 0.6rem;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 3px;
  animation: blink 0.8s step-end infinite;
  letter-spacing: 0.1em;
}
.rec-badge.visible { display: inline-block; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

/* ─── Toast ─── */
#toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-card);
  border: 1px solid var(--neon-cyan);
  border-radius: 5px;

<script>
/* ═══════════════════════════════════════════════════════════════
   NEONBEAT — Sound Loop Mixer
   Audio Engine using Web Audio API
   ═══════════════════════════════════════════════════════════════ */

// ── Colour palette cycling for tracks ──
const TRACK_COLORS = [
  'var(--neon-cyan)', 'var(--neon-pink)', 'var(--neon-purple)',
  'var(--neon-yellow)', 'var(--neon-green)', '#ff7700',
  '#00aaff', '#ff00aa'
];
let colorIdx = 0;
const nextColor = () => TRACK_COLORS[colorIdx++ % TRACK_COLORS.length];

/* ─────────────────────────────────────────────────────────────
   AUDIO ENGINE (AudioService)
   ───────────────────────────────────────────────────────────── */
const AudioService = (() => {
  let ctx = null;
  let masterGain = null;
  let masterAnalyser = null;
  let isPlaying = false;
  let startContextTime = 0;   // ctx.currentTime when playback began
  let loopStartBeat = 0;      // which beat index we started on

  const tracks = [];           // array of TrackState objects
  let masterBpm = 120;
  let masterBars = 4;          // default loop length in bars
  let beatCount = 0;           // running beat index for UI
  let animFrame = null;

  // ── Init / Resume AudioContext ──
  function ensureContext() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.value = 0.8;
      masterAnalyser = ctx.createAnalyser();
      masterAnalyser.fftSize = 256;
      masterGain.connect(masterAnalyser);
      masterAnalyser.connect(ctx.destination);
      updateStatusUI(true);
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function setMasterVolume(v) {
    if (masterGain) masterGain.gain.setTargetAtTime(v, ctx.currentTime, 0.01);
  }

  function setMasterBpm(bpm) {
    masterBpm = bpm;
    // Update all track BPM badges
    tracks.forEach(t => updateTrackMetaUI(t));
  }

  // ── BPM Detection (autocorrelation + onset energy) ──
  function detectBpm(audioBuffer) {
    return new Promise(resolve => {
      try {
        const data = audioBuffer.getChannelData(0);
        const sr = audioBuffer.sampleRate;
        // Downsample to ~4400 Hz for speed
        const step = Math.round(sr / 4400);
        const ds = [];
        for (let i = 0; i < data.length; i += step) ds.push(Math.abs(data[i]));

        // Energy envelope (simple RMS over 50ms windows)
        const winSamples = Math.round(0.05 * (sr / step));
        const energy = [];
        for (let i = 0; i < ds.length - winSamples; i += Math.round(winSamples / 2)) {
          let e = 0;
          for (let j = 0; j < winSamples; j++) e += ds[i + j] ** 2;
          energy.push(Math.sqrt(e / winSamples));
        }

        // Autocorrelation on energy signal
        const minBpm = 60, maxBpm = 200;
        const hopDur = 0.025; // seconds per hop
        const minLag = Math.round(60 / (maxBpm * hopDur));
        const maxLag = Math.round(60 / (minBpm * hopDur));
        let bestLag = minLag, bestCorr = -Infinity;
        for (let lag = minLag; lag <= maxLag && lag < energy.length; lag++) {
          let c = 0;
          for (let i = 0; i < energy.length - lag; i++) c += energy[i] * energy[i + lag];
          if (c > bestCorr) { bestCorr = c; bestLag = lag; }
        }
        const bpm = Math.round(60 / (bestLag * hopDur));
        resolve(Math.max(40, Math.min(240, bpm)));
      } catch {
        resolve(null);
      }
    });
  }

  // ── Build FX chain for a track ──
  // Signal path: source → distortion → eq (low/mid/hi shelf) → delay → reverb → trackGain → pan → masterGain
  function buildFxChain(track) {
    const c = ctx;

    // Gain (volume)
    track.gainNode = c.createGain();
    track.gainNode.gain.value = track.volume;

    // Panner
    track.panNode = c.createStereoPanner();
    track.panNode.pan.value = track.pan;

    // Distortion (WaveShaper)
    track.distNode = c.createWaveShaper();
    track.distNode.curve = makeDistCurve(0);
    track.distNode.oversample = '4x';

    // EQ (3-band)
    track.eqLow  = c.createBiquadFilter();
    track.eqLow.type = 'lowshelf';
    track.eqLow.frequency.value = 200;
    track.eqLow.gain.value = track.fx.eqLow;

    track.eqMid  = c.createBiquadFilter();
    track.eqMid.type = 'peaking';
    track.eqMid.frequency.value = 1000;
    track.eqMid.Q.value = 1.0;
    track.eqMid.gain.value = track.fx.eqMid;

    track.eqHigh = c.createBiquadFilter();
    track.eqHigh.type = 'highshelf';
    track.eqHigh.frequency.value = 4000;
    track.eqHigh.gain.value = track.fx.eqHigh;

    // Delay
    track.delayNode  = c.createDelay(2.0);
    track.delayNode.delayTime.value = track.fx.delayTime;
    track.delayFbNode = c.createGain();
    track.delayFbNode.gain.value = track.fx.delayFeedback;
    track.delayWetNode = c.createGain();
    track.delayWetNode.gain.value = track.fx.delayWet;
    track.delayDryNode = c.createGain();
    track.delayDryNode.gain.value = 1 - track.fx.delayWet;

    // Reverb (ConvolverNode with synthesized IR)
    track.reverbNode = c.createConvolver();
    track.reverbNode.buffer = makeImpulse(c, track.fx.reverbTime, track.fx.reverbDecay);
    track.reverbWetNode = c.createGain();
    track.reverbWetNode.gain.value = track.fx.reverbWet;
    track.reverbDryNode = c.createGain();
    track.reverbDryNode.gain.value = 1 - track.fx.reverbWet;

    // Track analyser
    track.analyser = c.createAnalyser();
    track.analyser.fftSize = 128;

    // ── Connect chain ──
    // distortion → EQ chain
    track.distNode.connect(track.eqLow);
    track.eqLow.connect(track.eqMid);
    track.eqMid.connect(track.eqHigh);

    // EQ → delay (dry+wet)
    track.eqHigh.connect(track.delayDryNode);
    track.eqHigh.connect(track.delayNode);
    track.delayNode.connect(track.delayFbNode);
    track.delayFbNode.connect(track.delayNode);
    track.delayNode.connect(track.delayWetNode);

    // delay merge → reverb (dry+wet)
    const delayMix = c.createGain();
    delayMix.gain.value = 1;
    track.delayDryNode.connect(delayMix);
    track.delayWetNode.connect(delayMix);
    track.delayMixNode = delayMix;

    delayMix.connect(track.reverbDryNode);
    delayMix.connect(track.reverbNode);
    track.reverbNode.connect(track.reverbWetNode);

    const reverbMix = c.createGain();
    reverbMix.gain.value = 1;
    track.reverbDryNode.connect(reverbMix);
    track.reverbWetNode.connect(reverbMix);
    track.reverbMixNode = reverbMix;

    // → gain → analyser → pan → master
    reverbMix.connect(track.gainNode);
    track.gainNode.connect(track.analyser);
    track.analyser.connect(track.panNode);
    track.panNode.connect(masterGain);

    track.fxChainInput = track.distNode; // entry point for sources
  }

  // Distortion curve
  function makeDistCurve(amount) {
    const n = 256, curve = new Float32Array(n);
    const k = amount * 100;
    for (let i = 0; i < n; i++) {
      const x = (i * 2) / n - 1;
      curve[i] = k === 0 ? x : ((Math.PI + k) * x) / (Math.PI + k * Math.abs(x));
    }
    return curve;
  }

  // Reverb Impulse Response (exponential decay noise)
  function makeImpulse(audioCtx, duration = 2, decay = 2) {
    const sr = audioCtx.sampleRate;
    const len = Math.round(sr * duration);
    const buf = audioCtx.createBuffer(2, len, sr);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
      }
    }
    return buf;
  }

  // ── Schedule / Play track source ──
  function scheduleTrackSource(track, when, offset) {
    if (!track.buffer) return;
    if (track.source) { try { track.source.stop(); } catch {} track.source = null; }

    const src = ctx.createBufferSource();
    src.buffer = track.buffer;
    src.loop = true;

    // Playback rate for BPM sync: masterBpm / trackBpm
    if (track.detectedBpm && track.detectedBpm > 0) {
      src.playbackRate.value = masterBpm / track.detectedBpm;
    } else {
      src.playbackRate.value = 1;
    }

    src.connect(track.fxChainInput);
    src.start(when, offset);
    track.source = src;
    track.playStartContextTime = when;
    track.playStartOffset = offset;
  }

  // ── Master Play / Pause ──
  function play() {
    ensureContext();
    if (isPlaying) return;
    isPlaying = true;
    startContextTime = ctx.currentTime;
    tracks.forEach(t => {
      if (!t.buffer || t.muted) return;
      scheduleTrackSource(t, startContextTime, 0);
    });
    scheduleMetronome();
    startRenderLoop();
    updatePlayUI(true);
  }

  function pause() {
    if (!isPlaying) return;
    isPlaying = false;
    tracks.forEach(t => {
      if (t.source) { try { t.source.stop(); } catch {} t.source = null; }
      t.trackPlaying = false;
      // Reset per-track play button icon
      const btn = t.el?.querySelector('[data-action="track-play"]');
      if (btn) {
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
        btn.title = 'Play this track';
        btn.style.background = 'transparent';
        btn.style.boxShadow = 'none';
      }
    });
    cancelAnimationFrame(animFrame);
    clearMetronome();
    updatePlayUI(false);
    updateBeatDotsUI(-1);
  }

  function togglePlay() {
    if (isPlaying) pause(); else play();
  }

  // ── Metronome (beat clock) ──
  let metroNodes = [];
  let metronomeEnabled = false;
  function setMetronome(enabled) { metronomeEnabled = enabled; }
  function scheduleMetronome() {
    if (!isPlaying) return;
    const secPerBeat = 60 / masterBpm;
    const now = ctx.currentTime;
    const elapsed = now - startContextTime;
    const nextBeat = Math.ceil(elapsed / secPerBeat);
    const lookahead = 0.2;

    for (let b = nextBeat; b < nextBeat + Math.ceil(lookahead / secPerBeat) + 1; b++) {
      const t = startContextTime + b * secPerBeat;
      if (t < now) continue;
      if (metronomeEnabled) {
        const osc = ctx.createOscillator();
        const env = ctx.createGain();
        osc.frequency.value = (b % 4 === 0) ? 880 : 660;
        env.gain.setValueAtTime(0, t);
        env.gain.linearRampToValueAtTime(0.12, t + 0.002);
        env.gain.linearRampToValueAtTime(0, t + 0.02);
        osc.connect(env);
        env.connect(masterGain);
        osc.start(t);
        osc.stop(t + 0.03);
        metroNodes.push({ osc, beat: b, time: t });
      }
    }
    setTimeout(() => { if (isPlaying) scheduleMetronome(); }, (lookahead * 1000) / 2);
  }
  function clearMetronome() { metroNodes = []; }

  // ── Render loop (requestAnimationFrame) for UI updates ──
  function startRenderLoop() {
    function frame() {
      if (!isPlaying) return;
      const now = ctx.currentTime;
      const elapsed = now - startContextTime;
      const secPerBeat = 60 / masterBpm;
      const currentBeat = Math.floor(elapsed / secPerBeat) % 4;
      const currentBar  = Math.floor(elapsed / (secPerBeat * 4)) + 1;
      const beatFrac = (elapsed % secPerBeat) / secPerBeat;

      // Beat dots
      updateBeatDotsUI(currentBeat);
      // Time display
      const m = Math.floor(elapsed / 60);
      const s = (elapsed % 60).toFixed(3).padStart(6, '0');
      el('time-display').textContent = `${m}:${s}`;
      el('beat-display').textContent =
        `${String(currentBar).padStart(2,'0')} : ${String(currentBeat+1).padStart(2,'0')}`;

      // Track progress bars
      tracks.forEach(t => {
        if (!t.buffer || !t.source) return;
        const loopDur = t.buffer.duration / (t.detectedBpm ? masterBpm / t.detectedBpm : 1);
        const pos = elapsed % loopDur;
        const pct = (pos / loopDur) * 100;
        const fillEl = t.el?.querySelector('.track-progress-fill');
        if (fillEl) fillEl.style.width = pct + '%';
      });

      // Master level meter
      updateMasterMeter();

      animFrame = requestAnimationFrame(frame);
    }
    animFrame = requestAnimationFrame(frame);
  }

  function updateMasterMeter() {
    if (!masterAnalyser) return;
    const data = new Uint8Array(masterAnalyser.frequencyBinCount);
    masterAnalyser.getByteTimeDomainData(data);
    let rms = 0;
    for (let i = 0; i < data.length; i++) {
      const v = (data[i] - 128) / 128;
      rms += v * v;
    }
    rms = Math.sqrt(rms / data.length);
    const bars = document.querySelectorAll('#master-meter .meter-bar');
    bars.forEach((b, i) => {
      const threshold = i / bars.length;
      const active = rms > threshold * 0.7;
      const h = active ? Math.round(4 + threshold * 24) : 2;
      b.style.height = h + 'px';
      b.style.background = i > 7 ? 'var(--neon-pink)' : i > 5 ? 'var(--neon-yellow)' : 'var(--neon-green)';
      b.style.opacity = active ? 1 : 0.2;
    });
  }

  // ── Track Management ──
  function addTrack(opts) {
    ensureContext();
    const id = 'trk_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const color = nextColor();
    const track = {
      id, color,
      name: opts.name || 'Loop',
      buffer: null,
      source: null,
      volume: 0.8,
      pan: 0,
      muted: false,
      soloed: false,
      detectedBpm: null,
      fx: {
        reverbWet: 0, reverbTime: 2, reverbDecay: 2,
        delayWet: 0, delayTime: 0.25, delayFeedback: 0.35,
        eqLow: 0, eqMid: 0, eqHigh: 0,
        distAmount: 0,
        reverbOn: false, delayOn: false, eqOn: false, distOn: false,
      },
      el: null,
      playStartContextTime: 0,
      playStartOffset: 0,
    };
    buildFxChain(track);
    tracks.push(track);

    // Create UI
    track.el = createTrackEl(track);
    const container = el('tracks-container');
    el('empty-state')?.remove();
    container.appendChild(track.el);
    updateTrackCountUI();

    // Load audio
    if (opts.buffer) {
      setTrackBuffer(track, opts.buffer);
    } else if (opts.url) {
      loadTrackFromUrl(track, opts.url);
    }

    return track;
  }

  function setTrackBuffer(track, buffer) {
    track.buffer = buffer;
    detectBpm(buffer).then(bpm => {
      track.detectedBpm = bpm;
      updateTrackMetaUI(track);
      drawWaveform(track, buffer);
      if (isPlaying) {
        const elapsed = ctx.currentTime - startContextTime;
        scheduleTrackSource(track, ctx.currentTime, elapsed % buffer.duration);
      }
    });
  }

  async function loadTrackFromUrl(track, url) {
    showToast('⬡ Loading…');
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const ab = await res.arrayBuffer();
      const buffer = await ctx.decodeAudioData(ab);
      setTrackBuffer(track, buffer);
      showToast('✓ Loaded: ' + track.name);
    } catch (e) {
      showToast('✗ Load failed: ' + e.message);
      removeTrack(track.id);
    }
  }

  function removeTrack(id) {
    const idx = tracks.findIndex(t => t.id === id);
    if (idx < 0) return;
    const track = tracks[idx];
    if (track.source) { try { track.source.stop(); } catch {} }
    track.el?.remove();
    tracks.splice(idx, 1);
    updateTrackCountUI();
    if (tracks.length === 0) showEmptyState();
  }

  function setTrackMute(id, muted) {
    const t = tracks.find(t => t.id === id);
    if (!t) return;
    t.muted = muted;
    t.gainNode.gain.setTargetAtTime(muted ? 0 : t.volume, ctx.currentTime, 0.02);
    if (muted && t.source) {
      try { t.source.stop(); } catch {} t.source = null;
    } else if (!muted && isPlaying && t.buffer) {
      const elapsed = ctx.currentTime - startContextTime;
      scheduleTrackSource(t, ctx.currentTime, elapsed % t.buffer.duration);
    }
  }

  function setTrackSolo(id, soloed) {
    const t = tracks.find(t => t.id === id);
    if (!t) return;
    t.soloed = soloed;
    const anySolo = tracks.some(x => x.soloed);
    tracks.forEach(x => {
      const shouldPlay = !anySolo || x.soloed;
      x.gainNode.gain.setTargetAtTime(shouldPlay ? x.volume : 0, ctx.currentTime, 0.02);
      x.el?.classList.toggle('solo-active', x.soloed);
    });
  }

  function setTrackVolume(id, vol) {
    const t = tracks.find(t => t.id === id);
    if (!t) return;
    t.volume = vol;
    const anySolo = tracks.some(x => x.soloed);
    if (!t.muted && (!anySolo || t.soloed)) {
      t.gainNode.gain.setTargetAtTime(vol, ctx.currentTime, 0.01);
    }
  }

  function setTrackPan(id, pan) {
    const t = tracks.find(t => t.id === id);
    if (!t) return;
    t.pan = pan;
    t.panNode.pan.setTargetAtTime(pan, ctx.currentTime, 0.01);
  }

  // ── FX setters ──
  function setFx(id, key, val) {
    const t = tracks.find(t => t.id === id);
    if (!t) return;
    t.fx[key] = val;
    switch(key) {
      case 'reverbWet':
        t.reverbWetNode.gain.setTargetAtTime(t.fx.reverbOn ? val : 0, ctx.currentTime, 0.05);
        t.reverbDryNode.gain.setTargetAtTime(t.fx.reverbOn ? 1 - val : 1, ctx.currentTime, 0.05);
        break;
      case 'reverbTime':
      case 'reverbDecay':
        t.reverbNode.buffer = makeImpulse(ctx, t.fx.reverbTime, t.fx.reverbDecay);
        break;
      case 'reverbOn':
        t.reverbWetNode.gain.setTargetAtTime(val ? t.fx.reverbWet : 0, ctx.currentTime, 0.05);
        t.reverbDryNode.gain.setTargetAtTime(val ? 1 - t.fx.reverbWet : 1, ctx.currentTime, 0.05);
        break;
      case 'delayWet':
        t.delayWetNode.gain.setTargetAtTime(t.fx.delayOn ? val : 0, ctx.currentTime, 0.05);
        t.delayDryNode.gain.setTargetAtTime(t.fx.delayOn ? 1 - val : 1, ctx.currentTime, 0.05);
        break;
      case 'delayTime':
        t.delayNode.delayTime.setTargetAtTime(val, ctx.currentTime, 0.05);
        break;
      case 'delayFeedback':
        t.delayFbNode.gain.setTargetAtTime(val, ctx.currentTime, 0.05);
        break;
      case 'delayOn':
        t.delayWetNode.gain.setTargetAtTime(val ? t.fx.delayWet : 0, ctx.currentTime, 0.05);
        t.delayDryNode.gain.setTargetAtTime(val ? 1 - t.fx.delayWet : 1, ctx.currentTime, 0.05);
        break;
      case 'eqLow':  t.eqLow.gain.setTargetAtTime(val, ctx.currentTime, 0.05);  break;
      case 'eqMid':  t.eqMid.gain.setTargetAtTime(val, ctx.currentTime, 0.05);  break;
      case 'eqHigh': t.eqHigh.gain.setTargetAtTime(val, ctx.currentTime, 0.05); break;
      case 'eqOn':
        const eqGain = val ? 1 : 0;
        ['eqLow','eqMid','eqHigh'].forEach(n => t[n].gain.setTargetAtTime(val ? t.fx[n] : 0, ctx.currentTime, 0.05));
        if (!val) { t.eqLow.gain.value = 0; t.eqMid.gain.value = 0; t.eqHigh.gain.value = 0; }
        break;
      case 'distAmount':
        t.distNode.curve = makeDistCurve(val);
        break;
    }
  }

  // ── Per-track play / stop toggle ──
  function toggleTrackPlay(id) {
    const t = tracks.find(t => t.id === id);
    if (!t || !t.buffer) return;
    ensureContext();
    if (t.source) {
      // Track is playing — stop it
      try { t.source.stop(); } catch {}
      t.source = null;
      t.trackPlaying = false;
    } else {
      // Track is stopped — start it
      const elapsed = isPlaying ? (ctx.currentTime - startContextTime) : 0;
      scheduleTrackSource(t, ctx.currentTime, elapsed % t.buffer.duration);
      t.trackPlaying = true;
    }
    return t.trackPlaying;
  }

  return {
    ensureContext, togglePlay, play, pause, setMasterBpm, setMasterVolume,
    addTrack, removeTrack, setTrackMute, setTrackSolo, setTrackVolume,
    setTrackPan, setFx, setTrackBuffer, toggleTrackPlay, setMetronome,
    isPlayingNow: () => isPlaying,
    getContext: () => ctx,
    getTrack: id => tracks.find(t => t.id === id),
  };
})();

/* ─────────────────────────────────────────────────────────────
   WAVEFORM DRAWING
   ───────────────────────────────────────────────────────────── */
function drawWaveform(track, buffer) {
  const canvas = track.el?.querySelector('.track-waveform canvas');
  if (!canvas) return;
  track.el.querySelector('.track-waveform').style.display = 'block';
  const w = canvas.parentElement.offsetWidth;
  const h = canvas.height = 32;
  canvas.width = w || 200;
  const ctx2 = canvas.getContext('2d');
  const data = buffer.getChannelData(0);
  const step = Math.ceil(data.length / canvas.width);
  ctx2.clearRect(0, 0, canvas.width, h);
  const color = track.color.replace('var(', '').replace(')', '');
  const colorMap = {
    '--neon-cyan': '#00f5ff', '--neon-pink': '#ff2d78',
    '--neon-purple': '#bf00ff', '--neon-yellow': '#ffe600',
    '--neon-green': '#00ff9d',
  };
  const hex = colorMap[color] || track.color;
  ctx2.strokeStyle = hex;
  ctx2.lineWidth = 1;
  ctx2.globalAlpha = 0.85;
  ctx2.beginPath();
  for (let x = 0; x < canvas.width; x++) {
    let min = 1, max = -1;
    for (let j = 0; j < step; j++) {
      const v = data[x * step + j] || 0;
      if (v < min) min = v;
      if (v > max) max = v;
    }
    const yMin = ((min + 1) / 2) * h;
    const yMax = ((max + 1) / 2) * h;
    ctx2.moveTo(x, yMin);
    ctx2.lineTo(x, yMax);
  }
  ctx2.stroke();
}

      <!-- Delay -->
      <div class="fx-section">
        <div class="fx-section-title">

          <button class="fx-toggle" data-fx="delayOn" data-id="${track.id}" title="On/Off"></button>
        </div>
        <div class="fx-row">
          <span class="fx-row-label">WET</span>

          <input type="range" class="fx-slider" min="-18" max="18" step="0.5" value="0" data-fx="eqMid" data-id="${track.id}" />
          <span class="fx-val">0dB</span>

  // ── Knob drag logic ──
  div.querySelectorAll('.knob').forEach(knob => {

    const isCenter = knob.dataset.center === 'true';

    const onMove = e => {
      const dy = startY - (e.touches ? e.touches[0].clientY : e.clientY);
      let val = Math.max(0, Math.min(100, startVal + dy));
      knob.dataset.val = val;
      const angle = isCenter
        ? (val / 100 - 0.5) * 270
        : -135 + (val / 100) * 270;
      knob.style.setProperty('--rot', angle + 'deg');
      knob.querySelector && null;
      // Rotate the indicator pip via transform-origin trick
      knob.style.setProperty('transform', 'rotate(' + angle + 'deg)');
      // But we use ::after pseudo — override via JS style on a child
      // Simpler: use a data attribute and CSS calc... instead, just inline style
      updateKnobVisual(knob, val, isCenter);

      const id = knob.dataset.id;
      if (knob.dataset.param === 'vol') {
        AudioService.setTrackVolume(id, val / 100);
        knob.nextElementSibling.textContent = Math.round(val) + '%';
      } else if (knob.dataset.param === 'pan') {
        const pan = (val / 100 - 0.5) * 2;
        AudioService.setTrackPan(id, pan);
        knob.nextElementSibling.textContent = val === 50 ? 'C' : (pan > 0 ? 'R' : 'L') + Math.abs(Math.round(pan * 100));
      }
    };

    const onUp = e => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
    };

    knob.addEventListener('mousedown', e => {
      e.preventDefault();
      startY = e.clientY;
      startVal = parseFloat(knob.dataset.val);
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    knob.addEventListener('touchstart', e => {
      e.preventDefault();
      startY = e.touches[0].clientY;
      startVal = parseFloat(knob.dataset.val);
      document.addEventListener('touchmove', onMove);
      document.addEventListener('touchend', onUp);
    }, { passive: false });

    // Init visual
    updateKnobVisual(knob, parseFloat(knob.dataset.val), isCenter);
  });

  // ── Track action buttons ──
  div.addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;

    if (action === 'track-play') {
      if (!track.buffer) { showToast('⚡ No audio loaded yet'); return; }
      const nowPlaying = AudioService.toggleTrackPlay(track.id);
      btn.innerHTML = nowPlaying
        ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14"/></svg>`
        : `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
      btn.title = nowPlaying ? 'Stop this track' : 'Play this track';
      btn.style.background = nowPlaying ? `${track.color}22` : 'transparent';
      btn.style.boxShadow  = nowPlaying ? `0 0 8px ${track.color}88` : 'none';
    }
    else if (action === 'delete') {
      div.style.transition = 'opacity 0.2s, transform 0.2s';
      div.style.opacity = '0'; div.style.transform = 'translateX(20px)';
      setTimeout(() => AudioService.removeTrack(track.id), 200);
    }
    else if (action === 'mute') {
      track.muted = !track.muted;
      btn.classList.toggle('active-mute', track.muted);
      div.classList.toggle('muted', track.muted);
      AudioService.setTrackMute(track.id, track.muted);
    }
    else if (action === 'solo') {
      track.soloed = !track.soloed;
      btn.classList.toggle('active-solo', track.soloed);
      AudioService.setTrackSolo(track.id, track.soloed);
    }
    else if (action === 'fx') {
      const panel = el('fx-' + track.id);
      panel.classList.toggle('open');
      btn.classList.toggle('active-fx', panel.classList.contains('open'));
    }
  });

  // ── FX sliders ──
  div.querySelectorAll('.fx-slider').forEach(slider => {
    slider.addEventListener('input', () => {
      const key = slider.dataset.fx;
      const val = parseFloat(slider.value);
      AudioService.setFx(slider.dataset.id, key, val);
      // Update display value
      const valEl = slider.nextElementSibling;
      if (!valEl) return;
      if (key === 'reverbWet' || key === 'delayWet' || key === 'delayFeedback' || key === 'distAmount')
        valEl.textContent = Math.round(val * 100) + '%';
      else if (key === 'delayTime')
        valEl.textContent = Math.round(val * 1000) + 'ms';
      else if (key === 'reverbTime')
        valEl.textContent = val.toFixed(1) + 's';
      else if (key === 'reverbDecay')
        valEl.textContent = val.toFixed(1);
      else if (key.startsWith('eq'))
        valEl.textContent = (val >= 0 ? '+' : '') + val.toFixed(1) + 'dB';
    });
  });

  // ── FX toggles ──
  div.querySelectorAll('.fx-toggle').forEach(toggle => {
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('on');
      const on = toggle.classList.contains('on');
      AudioService.setFx(toggle.dataset.id, toggle.dataset.fx, on);
    });
  });

  // ── Name editing ──
  const nameEl = div.querySelector('.track-name');
  nameEl.addEventListener('blur', () => { track.name = nameEl.textContent.trim(); });
  nameEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); } });

  return div;
}

function updateKnobVisual(knob, val, isCenter) {
  const angle = isCenter ? (val / 100 - 0.5) * 270 : -135 + (val / 100) * 270;
  // Draw indicator using canvas inside knob
  let canvas = knob.querySelector('canvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.width = 36; canvas.height = 36;
    canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;pointer-events:none;';
    knob.style.position = 'relative';
    knob.appendChild(canvas);
  }
  const ctx2 = canvas.getContext('2d');
  ctx2.clearRect(0, 0, 36, 36);
  const rad = (angle - 90) * Math.PI / 180;
  const cx = 18, cy = 18, r = 13;
  ctx2.beginPath();
  ctx2.moveTo(cx, cy);
  ctx2.lineTo(cx + r * Math.cos(rad), cy + r * Math.sin(rad));
  ctx2.strokeStyle = knob.style.color || '#00f5ff';
  ctx2.lineWidth = 2.5;
  ctx2.lineCap = 'round';
  ctx2.stroke();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ─────────────────────────────────────────────────────────────
   DEMO LOOPS (synthesized via Web Audio — no external files)
   ───────────────────────────────────────────────────────────── */
const DEMO_LOOPS = [
  { name: 'Synth Bass 120 BPM',    bpm: 120, fn: makeSynthBass },
  { name: 'House Kick 128 BPM',    bpm: 128, fn: makeKickLoop  },
  { name: 'Hi-Hat 130 BPM',        bpm: 130, fn: makeHiHat     },
  { name: 'Pad Chord 90 BPM',      bpm: 90,  fn: makePad       },
  { name: 'Glitchy Arp 140 BPM',   bpm: 140, fn: makeArp       },
  { name: 'Sub Bass 100 BPM',      bpm: 100, fn: makeSubBass   },
];

function makeOfflineCtx(bars, bpm) {
  const secPerBeat = 60 / bpm;
  const dur = bars * 4 * secPerBeat;
  const sr = 44100;
  return { ctx: new OfflineAudioContext(2, Math.round(sr * dur), sr), dur, secPerBeat };
}

async function makeSynthBass() {
  const { ctx, dur, secPerBeat } = makeOfflineCtx(2, 120);
  const notes = [55, 55, 73.4, 55, 55, 73.4, 55, 82.4];
  const master = ctx.createGain(); master.gain.value = 0.6;
  master.connect(ctx.destination);
  notes.forEach((freq, i) => {
    const t = i * secPerBeat * 0.5;
    const osc = ctx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = freq;
    const filt = ctx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 800; filt.Q.value = 3;
    const env = ctx.createGain();
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(0.8, t + 0.01);
    env.gain.exponentialRampToValueAtTime(0.001, t + secPerBeat * 0.45);
    osc.connect(filt); filt.connect(env); env.connect(master);
    osc.start(t); osc.stop(t + secPerBeat * 0.5);
  });
  return ctx.startRendering();
}

async function makeKickLoop() {
  const { ctx, dur, secPerBeat } = makeOfflineCtx(2, 128);
  const beats = [0, 1, 2, 3, 4, 5, 6, 7];
  const master = ctx.createGain(); master.gain.value = 0.8; master.connect(ctx.destination);
  beats.forEach(b => {
    const t = b * secPerBeat * 0.5;
    const osc = ctx.createOscillator(); osc.type = 'sine';
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.exponentialRampToValueAtTime(30, t + 0.15);
    const env = ctx.createGain();
    env.gain.setValueAtTime(1, t);
    env.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(env); env.connect(master);
    osc.start(t); osc.stop(t + 0.35);
  });
  return ctx.startRendering();
}

async function makeHiHat() {
  const { ctx, dur, secPerBeat } = makeOfflineCtx(2, 130);
  const master = ctx.createGain(); master.gain.value = 0.4; master.connect(ctx.destination);
  const steps = 16;
  const stepDur = (secPerBeat * 4 * 2) / steps;
  for (let i = 0; i < steps * 2; i++) {
    const t = i * stepDur;
    const bufLen = Math.round(0.05 * 44100);
    const nb = ctx.createBuffer(1, bufLen, 44100);
    const d = nb.getChannelData(0);
    for (let j = 0; j < bufLen; j++) d[j] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = nb;
    const hpf = ctx.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = 7000;
    const env = ctx.createGain();
    env.gain.setValueAtTime(i % 2 === 0 ? 1 : 0.5, t);
    env.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    src.connect(hpf); hpf.connect(env); env.connect(master);
    src.start(t); src.stop(t + 0.06);
  }
  return ctx.startRendering();
}

async function makePad() {
  const { ctx, dur, secPerBeat } = makeOfflineCtx(4, 90);
  const master = ctx.createGain(); master.gain.value = 0.35; master.connect(ctx.destination);
  const chords = [[220, 277.2, 329.6], [196, 246.9, 293.7], [174.6, 220, 261.6], [196, 246.9, 329.6]];
  chords.forEach((chord, ci) => {
    const t = ci * secPerBeat * 4;
    chord.forEach(freq => {
      const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.value = freq;
      const osc2 = ctx.createOscillator(); osc2.type = 'triangle'; osc2.frequency.value = freq * 1.003;
      const env = ctx.createGain();
      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(0.3, t + 0.5);
      env.gain.setValueAtTime(0.3, t + secPerBeat * 3.5);
      env.gain.linearRampToValueAtTime(0, t + secPerBeat * 4);
      osc.connect(env); osc2.connect(env); env.connect(master);
      osc.start(t); osc.stop(t + secPerBeat * 4 + 0.1);
      osc2.start(t); osc2.stop(t + secPerBeat * 4 + 0.1);
    });
  });
  return ctx.startRendering();
}

async function makeArp() {
  const { ctx, dur, secPerBeat } = makeOfflineCtx(2, 140);
  const master = ctx.createGain(); master.gain.value = 0.5; master.connect(ctx.destination);
  const notes = [440, 523.3, 659.3, 880, 659.3, 523.3, 440, 392];
  const noteDur = secPerBeat * 0.5;
  notes.forEach((freq, i) => {
    for (let rep = 0; rep < 2; rep++) {
      const t = (i + rep * notes.length) * noteDur;
      const osc = ctx.createOscillator(); osc.type = 'square'; osc.frequency.value = freq;
      const filt = ctx.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = freq * 2; filt.Q.value = 2;
      const env = ctx.createGain();
      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(0.4, t + 0.01);
      env.gain.exponentialRampToValueAtTime(0.001, t + noteDur * 0.8);
      osc.connect(filt); filt.connect(env); env.connect(master);
      osc.start(t); osc.stop(t + noteDur);
    }
  });
  return ctx.startRendering();
}

async function makeSubBass() {
  const { ctx, dur, secPerBeat } = makeOfflineCtx(2, 100);
  const master = ctx.createGain(); master.gain.value = 0.7; master.connect(ctx.destination);
  const pattern = [36.7, 0, 36.7, 0, 41.2, 0, 32.7, 0];
  const stepDur = secPerBeat * 0.5;
  pattern.forEach((freq, i) => {
    if (!freq) return;
    for (let rep = 0; rep < 2; rep++) {
      const t = (i + rep * pattern.length) * stepDur;
      const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.value = freq;
      const env = ctx.createGain();
      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(0.9, t + 0.015);
      env.gain.exponentialRampToValueAtTime(0.001, t + stepDur * 0.9);
      osc.connect(env); env.connect(master);
      osc.start(t); osc.stop(t + stepDur);
    }
  });
  return ctx.startRendering();
}

// ── Populate demo modal ──
function populateDemoModal() {
  const list = el('demo-list');
  list.innerHTML = '';
  DEMO_LOOPS.forEach((loop, i) => {
    const item = document.createElement('div');
    item.className = 'demo-item';
    item.innerHTML = `
      <div>
        <div class="demo-item-name">${escHtml(loop.name)}</div>
        <div class="demo-item-meta">${loop.bpm} BPM · Synthesized</div>
      </div>
      <span style="color:var(--neon-purple);font-size:1rem;">▶</span>
    `;
    item.addEventListener('click', async () => {
      closeDemoModal();
      showToast('⚡ Generating: ' + loop.name + '…');
      AudioService.ensureContext();
      const buffer = await loop.fn();
      const track = AudioService.addTrack({ name: loop.name });
      track.detectedBpm = loop.bpm;
      AudioService.setTrackBuffer(track, buffer);
      showToast('✓ Added: ' + loop.name);
    });
    list.appendChild(item);
  });
}

function closeDemoModal() { el('demo-modal').classList.remove('visible'); }

/* ─────────────────────────────────────────────────────────────
   MICROPHONE RECORDING
   ───────────────────────────────────────────────────────────── */
let mediaRecorder = null;
let recChunks = [];
let recTimer = null;
let recSeconds = 0;
let recStream = null;

async function startRecording() {
  try {
    recStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    AudioService.ensureContext();
    mediaRecorder = new MediaRecorder(recStream);
    recChunks = [];
    recSeconds = 0;
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
    mediaRecorder.start(100);
    el('rec-modal').classList.add('visible');
    updateRecTimer();
    recTimer = setInterval(updateRecTimer, 1000);
  } catch(e) {
    showToast('✗ Mic access denied: ' + e.message);
  }
}

function updateRecTimer() {
  recSeconds++;
  const m = Math.floor(recSeconds / 60);
  const s = String(recSeconds % 60).padStart(2, '0');
  el('rec-timer').textContent = m + ':' + s;
}

function stopRecording(save) {
  clearInterval(recTimer);
  el('rec-modal').classList.remove('visible');
  if (!mediaRecorder) return;
  mediaRecorder.onstop = async () => {
    if (save && recChunks.length) {
      const blob = new Blob(recChunks, { type: 'audio/webm' });
      const ab = await blob.arrayBuffer();
      const ctx = AudioService.getContext();
      try {
        const buffer = await ctx.decodeAudioData(ab);
        const track = AudioService.addTrack({ name: 'Recording ' + new Date().toLocaleTimeString() });
        AudioService.setTrackBuffer(track, buffer);
        showToast('✓ Recording added');
      } catch(e) { showToast('✗ Decode failed: ' + e.message); }
    }
    recChunks = [];
  };
  mediaRecorder.stop();
  recStream?.getTracks().forEach(t => t.stop());
  recStream = null;
}

/* ─────────────────────────────────────────────────────────────
   EVENT WIRING
   ───────────────────────────────────────────────────────────── */

// Master play
el('master-play').addEventListener('click', () => AudioService.togglePlay());

// Space bar shortcut
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    AudioService.togglePlay();
  }
});

// BPM input
el('bpm-input').addEventListener('change', () => {
  const v = parseInt(el('bpm-input').value);
  if (v >= 40 && v <= 240) AudioService.setMasterBpm(v);
});

// Master volume
el('master-vol').addEventListener('input', () => {
  AudioService.setMasterVolume(parseFloat(el('master-vol').value));
  updateFaderTrack(el('master-vol'));
});

function updateFaderTrack(slider) {
  const pct = ((slider.value - slider.min) / (slider.max - slider.min)) * 100;
  slider.style.setProperty('--pct', pct + '%');
}
updateFaderTrack(el('master-vol'));

// File upload
el('btn-upload').addEventListener('click', () => {
  AudioService.ensureContext();
  el('file-input').click();
});
el('file-input').addEventListener('change', async e => {
  for (const file of e.target.files) {
    const track = AudioService.addTrack({ name: file.name.replace(/\.[^.]+$/, '') });
    showToast('⬡ Decoding: ' + file.name + '…');
    const ab = await file.arrayBuffer();
    try {
      const buffer = await AudioService.getContext().decodeAudioData(ab);
      AudioService.setTrackBuffer(track, buffer);
    } catch(err) { showToast('✗ Could not decode: ' + file.name); AudioService.removeTrack(track.id); }
  }
  e.target.value = '';
});

// Demo
el('btn-demo').addEventListener('click', () => {
  AudioService.ensureContext();
  populateDemoModal();
  el('demo-modal').classList.add('visible');
});
el('demo-modal').addEventListener('click', e => { if (e.target === el('demo-modal')) closeDemoModal(); });

// URL input
el('btn-url').addEventListener('click', () => {
  el('url-input-row').classList.toggle('visible');
  if (el('url-input-row').classList.contains('visible')) el('url-field').focus();
});
el('url-cancel').addEventListener('click', () => el('url-input-row').classList.remove('visible'));
el('url-go').addEventListener('click', loadFromUrl);
el('url-field').addEventListener('keydown', e => { if (e.key === 'Enter') loadFromUrl(); });

function loadFromUrl() {
  const url = el('url-field').value.trim();
  if (!url) return;
  const name = url.split('/').pop().replace(/\?.*/, '').replace(/\.[^.]+$/, '') || 'URL Loop';
  AudioService.ensureContext();
  AudioService.addTrack({ name, url });
  el('url-field').value = '';
  el('url-input-row').classList.remove('visible');
}

// Mic
el('btn-mic').addEventListener('click', () => startRecording());
el('rec-stop').addEventListener('click', () => stopRecording(true));
el('rec-cancel').addEventListener('click', () => stopRecording(false));

// Drag & drop files
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', async e => {
  e.preventDefault();
  AudioService.ensureContext();
  for (const file of e.dataTransfer.files) {
    if (!file.type.startsWith('audio/')) continue;
    const track = AudioService.addTrack({ name: file.name.replace(/\.[^.]+$/, '') });
    const ab = await file.arrayBuffer();
    try {
      const buffer = await AudioService.getContext().decodeAudioData(ab);
      AudioService.setTrackBuffer(track, buffer);
    } catch { AudioService.removeTrack(track.id); }
  }
});

// Metronome toggle
el('metro-btn').addEventListener('click', () => {
  const btn = el('metro-btn');
  const on = !btn.classList.contains('on');
  btn.classList.toggle('on', on);
  AudioService.setMetronome(on);
  showToast(on ? '🎵 Metronome ON' : '🔇 Metronome OFF');
});

// Init
updateTrackCountUI();
showToast('◈ NEONBEAT ready — add a loop to begin', 3000);
</script>
